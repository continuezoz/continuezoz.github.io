short_bio: >-
  <p>
    Welcome. I am a PhD Candidate in the School of Mathematics and Computational Science at Xiangtan University, where I have been pursuing my doctoral degree since September 2020, under the supervision of Prof. Jianzhou Liu.
    <br><br>
    Broadly speaking, my research interests span Numerical Linear Algebra, Matrix Theory, and Control Theory, with a primary focus on the solution estimation and numerical algorithms for matrix differential equations, as well as their applications in control systems.
    <br><br>
    I am currently involved in the following research projects, and serve as the Principal Investigator for one of them:
    <br>
    · Mixed-Precision Sparse Matrix Solution Methods and Error Theoretical Analysis, National Key Research and Development Program of China
    <br>
    · Properties and Efficient Algorithms for Matrix Equations and Matrix Differential Equations Based on Controllability Analysis, General Program of the National Natural Science Foundation of China (NSFC)
    <br>
    · Constrained Matrix Equations in Control Systems and Their Applications, Hunan Provincial Graduate Research Innovation Project (Principal Investigator)
  </p>

